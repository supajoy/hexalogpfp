<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>hexalog · frame studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* hexalog brand */
    --violet: #7F47FB;
    --deep:   #431B8D;
    --dark:   #26124D;
    --lav:    #8B8DFF;
    --yellow: #FFD728;
    --offwhite: #F5F5FF;
    --paper:  #FCFBF7;

    /* app surfaces */
    --bg:     #160A33;
    --panel:  #1E1142;
    --panel-2:#251552;
    --line:   #3a2a6b;
    --text:   var(--offwhite);
    --muted:  #9b93c4;

    --display: "Space Grotesk", system-ui, sans-serif;
    --body: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: var(--body); -webkit-font-smoothing: antialiased; }
  body { display: grid; grid-template-columns: 340px 1fr; min-height: 100vh; }

  /* ---------- sidebar ---------- */
  aside {
    background: var(--panel);
    border-right: 1px solid var(--line);
    padding: 26px 24px 22px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    overflow: auto;
  }
  .brand { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
  .brand .logo { width: 100%; max-width: 250px; height: auto; display: block; }
  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--lav);
  }

  .group { display: flex; flex-direction: column; gap: 9px; }
  .group > label {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  button, .filebtn {
    display: inline-flex; align-items: center; justify-content: center;
    height: 38px; padding: 0 14px;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 10px;
    font-family: var(--body);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    transition: border-color .15s, background .15s, transform .05s;
  }
  button:hover, .filebtn:hover { border-color: var(--violet); }
  button:active { transform: translateY(1px); }
  button.primary {
    background: var(--violet); color: #fff; border-color: var(--violet);
    font-weight: 600; letter-spacing: .01em;
    box-shadow: 0 6px 22px -8px var(--violet);
  }
  button.primary:hover { filter: brightness(1.08); border-color: var(--violet); }
  button:disabled { opacity: .38; cursor: not-allowed; filter: none; box-shadow: none; }
  input[type="file"] { display: none; }

  /* choose image — the primary entry action, made prominent */
  .filebtn {
    gap: 10px; height: 48px;
    background: linear-gradient(180deg, #8c5bff, var(--violet));
    color: #fff; border-color: var(--violet);
    font-size: 14px; font-weight: 600; letter-spacing: .01em;
    box-shadow: 0 10px 28px -8px var(--violet);
  }
  .filebtn:hover { border-color: var(--violet); filter: brightness(1.07); }
  .filebtn svg { width: 18px; height: 18px; color: #fff; }
  .filebtn #filebtnLabel { color: #fff; }
  .pastehint { font-size: 11.5px; color: var(--muted); text-align: center; margin-top: -8px; }
  .pastehint kbd {
    font-family: var(--body); font-size: 10.5px; color: var(--lav);
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 5px;
    padding: 1px 5px; margin: 0 1px;
  }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 10px 28px -8px var(--violet); }
    50%      { box-shadow: 0 10px 34px -6px var(--violet), 0 0 0 4px rgba(127,71,251,.18); }
  }
  .filebtn.pulse { animation: pulseGlow 2.4s ease-in-out infinite; }

  /* frame style chips — live thumbnails of the real overlays */
  .styles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .chip {
    position: relative; aspect-ratio: 1 / 1; border-radius: 10px;
    border: 1px solid var(--line); background: #160a33;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    cursor: pointer; transition: border-color .15s, box-shadow .15s;
  }
  .chip img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
  .chip .tip {
    position: absolute; bottom: 0; left: 0; right: 0;
    font-size: 9px; letter-spacing: .1em; text-transform: uppercase; text-align: center;
    color: var(--muted); padding: 3px 0 2px; background: linear-gradient(transparent, #160a33cc 55%);
  }
  .chip:hover { border-color: var(--violet); }
  .chip.active { border-color: var(--violet); box-shadow: inset 0 0 0 1px var(--violet); }
  .chip.active .tip { color: var(--lav); }

  /* zoom */
  .zoomhead { display: flex; justify-content: space-between; align-items: baseline; }
  .zoomhead b { font-family: var(--display); font-weight: 600; font-size: 13px; color: var(--text); letter-spacing: -.02em; }
  input[type="range"] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 4px;
    border-radius: 4px; background: var(--line); outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: var(--violet); cursor: pointer; border: 2px solid var(--offwhite);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%; background: var(--violet); cursor: pointer; border: 2px solid var(--offwhite);
  }

  .row { display: flex; gap: 9px; }
  .row > * { flex: 1; }

  .hint { font-size: 12px; color: var(--muted); line-height: 1.55; }
  .hint b { color: var(--lav); font-weight: 500; }

  .spacer { flex: 1; }
  .foot {
    border-top: 1px solid var(--line); padding-top: 14px;
    font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted);
    display: flex; justify-content: space-between;
  }

  /* ---------- stage ---------- */
  main { position: relative; display: flex; align-items: center; justify-content: center; padding: 40px; overflow: auto; }
  /* isometric cube lattice backdrop (brand pattern, whisper-quiet) */
  main::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image:
      repeating-linear-gradient(30deg,  rgba(127,71,251,.06) 0 1px, transparent 1px 38px),
      repeating-linear-gradient(150deg, rgba(127,71,251,.06) 0 1px, transparent 1px 38px),
      repeating-linear-gradient(270deg, rgba(127,71,251,.04) 0 1px, transparent 1px 38px);
    mask-image: radial-gradient(circle at center, #000 55%, transparent 100%);
  }
  .stagewrap { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .stagehint { margin: 0; color: #fff; font-size: 14px; font-weight: 500; text-align: center; }
  .stage {
    position: relative;
    width: min(640px, 74vh);
    aspect-ratio: 1 / 1;
    border-radius: 50%;            /* true circle — reads unambiguously as a round pfp */
    overflow: hidden;
    cursor: grab;
    background: transparent;
    box-shadow: 0 30px 80px -30px rgba(0,0,0,.8);
  }
  .stage.dragging { cursor: grabbing; }
  canvas { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
<aside>
  <div class="brand">
    <img class="logo" src="logo.png" alt="hexalog — simplify · supply · succeed" />
    <span class="eyebrow">frame studio</span>
  </div>

  <div class="group">
    <label>photo</label>
    <label class="filebtn pulse" id="filebtn" for="file">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M12 4 7 9M12 4l5 5"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
      <span id="filebtnLabel">choose image</span>
    </label>
  </div>
  <input id="file" type="file" accept="image/*" />
  <div class="pastehint">or press <kbd>⌘</kbd><kbd>V</kbd> to paste a copied image</div>

  <div class="group">
    <label>frame style</label>
    <div class="styles" id="styles">
      <div class="chip active" data-style="ring-badge"><img src="frames/ring-badge.png" alt=""><span class="tip">badge</span></div>
      <div class="chip" data-style="ring-soft"><img src="frames/ring-soft.png" alt=""><span class="tip">soft</span></div>
      <div class="chip" data-style="ring-white"><img src="frames/ring-white.png" alt=""><span class="tip">white</span></div>
      <div class="chip" data-style="tag-violet"><img src="frames/tag-violet.png" alt=""><span class="tip">tag</span></div>
      <div class="chip" data-style="tag-yellow"><img src="frames/tag-yellow.png" alt=""><span class="tip">tag · y</span></div>
      <div class="chip" data-style="tag-white"><img src="frames/tag-white.png" alt=""><span class="tip">tag · w</span></div>
    </div>
  </div>

  <div class="group">
    <div class="zoomhead"><label>zoom</label><b id="zoomVal">1.00×</b></div>
    <input id="zoom" type="range" min="0.2" max="5" step="0.01" value="1" />
  </div>

  <div class="row">
    <button id="reset">reset</button>
    <button id="download" class="primary" disabled>download png</button>
  </div>

  <div class="hint">drag inside the frame to reposition · scroll or use the slider to zoom · <b>double-tap</b> the canvas to swap photo.</div>

  <div class="spacer"></div>
  <div class="foot"><span>internal tool</span><span>1000 × 1000</span></div>
</aside>

<main>
  <div class="stagewrap">
    <div class="stage" id="stage">
      <canvas id="canvas" width="1000" height="1000"></canvas>
    </div>
    <p class="stagehint">double tap or paste (⌘V) to add an image</p>
  </div>
</main>

<script>
(() => {
  const SIZE = 1000, CX = 500, CY = 500;

  // ring frames have a ~450px hole → photo tucks just inside the ring (no seam).
  // tag frames have no ring → the photo IS the circle, so it fills to the edge.
  const RING_R = 458;
  const FULL_R = 500;
  const photoR = () => activeStyle.startsWith('tag') ? FULL_R : RING_R;

  // real hexalog overlays (1000×1000, transparent center)
  const FRAMES = {
    'ring-badge':  'frames/ring-badge.png',
    'ring-soft':   'frames/ring-soft.png',
    'ring-white':  'frames/ring-white.png',
    'tag-violet':  'frames/tag-violet.png',
    'tag-yellow':  'frames/tag-yellow.png',
    'tag-white':   'frames/tag-white.png',
  };
  const frames = {};
  for (const [k, src] of Object.entries(FRAMES)) {
    const img = new Image();
    img.onload = render;
    img.src = src;
    frames[k] = img;
  }

  // default profile-picture placeholder image (shown until a photo is chosen)
  const placeholder = new Image();
  placeholder.onload = render;
  placeholder.src = 'placeholder.png';

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const fileInput = document.getElementById('file');
  const zoom = document.getElementById('zoom');
  const zoomVal = document.getElementById('zoomVal');
  const resetBtn = document.getElementById('reset');
  const downloadBtn = document.getElementById('download');
  const stage = document.getElementById('stage');

  let activeStyle = 'ring-badge';
  let photo = null;
  let state = { scale: 1, ox: 0, oy: 0 };

  function fitScale(img) {
    const r = photoR();
    return Math.max((2 * r) / img.width, (2 * r) / img.height);
  }

  // default profile-picture placeholder image, drawn inside the frame
  function drawPlaceholder() {
    if (!placeholder.complete || !placeholder.naturalWidth) return;
    const R = photoR();
    ctx.save();
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.clip();
    // soft off-white circle with a gentle vignette for depth
    const g = ctx.createRadialGradient(CX, CY - 40, 60, CX, CY, R);
    g.addColorStop(0, '#FFFFFF');
    g.addColorStop(1, '#ECECF1');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, SIZE, SIZE);
    // avatar fills the circle at native proportions (centered)
    const s = (2 * R) / placeholder.width;
    const w = placeholder.width * s, h = placeholder.height * s;
    ctx.drawImage(placeholder, CX - w / 2, CY - h / 2, w, h);
    ctx.restore();
  }

  function render() {
    ctx.clearRect(0, 0, SIZE, SIZE);
    if (photo) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(CX, CY, photoR(), 0, Math.PI * 2);
      ctx.clip();
      const s = state.scale * fitScale(photo);
      const w = photo.width * s, h = photo.height * s;
      ctx.drawImage(photo, CX - w / 2 + state.ox, CY - h / 2 + state.oy, w, h);
      ctx.restore();
    } else {
      drawPlaceholder();
    }
    const f = frames[activeStyle];
    if (f && f.complete) ctx.drawImage(f, 0, 0, SIZE, SIZE);
  }

  // ---- controls ----
  document.getElementById('styles').addEventListener('click', (e) => {
    const chip = e.target.closest('.chip'); if (!chip) return;
    activeStyle = chip.dataset.style;
    document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === chip));
    render();
  });

  function loadImageFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const img = new Image();
    img.onload = () => {
      photo = img;
      state = { scale: 1, ox: 0, oy: 0 };
      zoom.value = 1; zoomVal.textContent = '1.00×';
      downloadBtn.disabled = false;
      document.getElementById('filebtn').classList.remove('pulse');
      document.getElementById('filebtnLabel').textContent = 'change image';
      render();
    };
    img.src = URL.createObjectURL(file);
  }

  fileInput.addEventListener('change', (e) => loadImageFile(e.target.files?.[0]));

  // paste a copied image anywhere (⌘V / Ctrl+V)
  window.addEventListener('paste', (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const it of items) {
      if (it.type.startsWith('image/')) {
        loadImageFile(it.getAsFile());
        e.preventDefault();
        break;
      }
    }
  });

  zoom.addEventListener('input', () => {
    state.scale = parseFloat(zoom.value);
    zoomVal.textContent = state.scale.toFixed(2) + '×';
    render();
  });

  resetBtn.addEventListener('click', () => {
    if (!photo) return;
    state = { scale: 1, ox: 0, oy: 0 };
    zoom.value = 1; zoomVal.textContent = '1.00×';
    render();
  });

  // drag
  let dragging = false, dragStart = null;
  const toCanvas = (e) => {
    const rect = canvas.getBoundingClientRect();
    return { x: ((e.clientX - rect.left) / rect.width) * SIZE, y: ((e.clientY - rect.top) / rect.height) * SIZE };
  };
  stage.addEventListener('pointerdown', (e) => {
    if (!photo) return;
    dragging = true; stage.classList.add('dragging'); stage.setPointerCapture(e.pointerId);
    const p = toCanvas(e); dragStart = { x: p.x, y: p.y, ox: state.ox, oy: state.oy };
  });
  stage.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const p = toCanvas(e);
    state.ox = dragStart.ox + (p.x - dragStart.x);
    state.oy = dragStart.oy + (p.y - dragStart.y);
    render();
  });
  const endDrag = (e) => {
    dragging = false; stage.classList.remove('dragging');
    if (e?.pointerId !== undefined && stage.hasPointerCapture(e.pointerId)) stage.releasePointerCapture(e.pointerId);
  };
  stage.addEventListener('pointerup', endDrag);
  stage.addEventListener('pointercancel', endDrag);
  stage.addEventListener('dblclick', () => fileInput.click());

  stage.addEventListener('wheel', (e) => {
    if (!photo) return;
    e.preventDefault();
    const next = Math.min(5, Math.max(0.2, state.scale * Math.exp(-e.deltaY * 0.0015)));
    state.scale = next; zoom.value = next; zoomVal.textContent = next.toFixed(2) + '×';
    render();
  }, { passive: false });

  downloadBtn.addEventListener('click', () => {
    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'hexalog-pfp-1000.png'; a.click();
      URL.revokeObjectURL(url);
    }, 'image/png');
  });

  // first paint (and re-paint once fonts/frames have loaded)
  render();
  if (document.fonts?.ready) document.fonts.ready.then(render);
})();
</script>
</body>
</html>
